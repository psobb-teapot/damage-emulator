# このワークフローは公開ミラー (github.com/psobb-teapot/damage-emulator) で
# 動く。rappyruns モノレポ内 (damage-emulator/.github/) ではネストされた
# .github は無効なので実行されない。ミラーへは rappyruns の
# emulator-mirror.yml が subtree split を push し、その push がこれを起動して
# https://psobb-teapot.github.io/damage-emulator/ を更新する。
name: Deploy to GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build web app
        run: npm run build:web

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist-web

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
